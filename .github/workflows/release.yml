name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump (use "current" to publish the version already in package.json)
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - current

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Sanity build
        run: bun run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve version and tag
        id: version
        run: |
          if [[ "${{ inputs.bump }}" == "current" ]]; then
            NEW_VERSION=$(node -p "require('./package.json').version")
            TAG="v$NEW_VERSION"
            if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              echo "Tag $TAG already exists locally; reusing it."
            else
              git tag -a "$TAG" -m "chore: release $TAG"
            fi
          else
            npm version "${{ inputs.bump }}" --message "chore: release v%s"
            NEW_VERSION=$(node -p "require('./package.json').version")
            TAG="v$NEW_VERSION"
          fi
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          if git ls-remote --exit-code --tags origin "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already on origin; skipping push."
          else
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists; skipping."
          else
            gh release create "${{ steps.version.outputs.tag }}" \
              --generate-notes \
              --title "${{ steps.version.outputs.tag }}"
          fi

      - name: Publish to npm (trusted publishing if configured, NPM_TOKEN fallback otherwise)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "Publishing with NPM_TOKEN (bootstrap mode)."
            echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" > ~/.npmrc
          else
            echo "Publishing via OIDC trusted publishing."
          fi
          npm publish --provenance --access public
