name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Install
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Debug — verify source bytes
        run: |
          echo "--- src/lib/context.ts (first 5 lines) ---"
          head -5 src/lib/context.ts
          echo "--- src/lib/project-config.ts (first 5 lines) ---"
          head -5 src/lib/project-config.ts

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
